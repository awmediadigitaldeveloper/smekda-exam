name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'

    - name: Enable Flutter desktop
      run: flutter config --enable-linux-desktop

    - name: Verify Flutter environment
      run: |
        flutter --version
        flutter doctor -v

    - name: Get dependencies
      run: flutter pub get

    - name: Build APK
      run: |
        flutter build apk --release --split-per-abi
        ls -la build/app/outputs/flutter-apk

    - name: Rename APK files
      shell: bash
      run: |
        cd build/app/outputs/flutter-apk
        shopt -s nullglob
        apk_files=( *.apk )
        if [ ${#apk_files[@]} -eq 0 ]; then
          echo "ERROR: No APK files found after build"
          ls -la
          exit 1
        fi

        for file in "${apk_files[@]}"; do
          if [[ $file == *"arm64-v8a"* ]]; then
            mv "$file" "smekda_exam-arm64-v8a.apk"
          elif [[ $file == *"armeabi-v7a"* ]]; then
            mv "$file" "smekda_exam-armeabi-v7a.apk"
          elif [[ $file == *"x86_64"* ]]; then
            mv "$file" "smekda_exam-x86_64.apk"
          else
            mv "$file" "smekda_exam.apk"
          fi
        done
        ls -la *.apk

    - name: Upload APK artifacts
      uses: actions/upload-artifact@v4
      with:
        name: smekda-exam-apk
        path: build/app/outputs/flutter-apk/*.apk
        retention-days: 30