name: Build Android APK and iOS IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    name: Build Android APK

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.6'
        channel: 'stable'

    - name: Enable Flutter desktop
      run: flutter config --enable-linux-desktop

    - name: Verify Flutter environment
      run: |
        flutter --version
        flutter doctor -v

    - name: Get dependencies
      run: flutter pub get

    - name: Build universal APK
      run: |
        flutter build apk --release
        ls -la build/app/outputs/flutter-apk

    - name: Rename APK file
      shell: bash
      run: |
        cd build/app/outputs/flutter-apk
        if [ ! -f app-release.apk ]; then
          echo "ERROR: app-release.apk not found"
          ls -la
          exit 1
        fi
        mv app-release.apk smekda_exam.apk
        ls -la *.apk

    - name: Upload APK artifacts
      uses: actions/upload-artifact@v4
      with:
        name: smekda-exam-apk
        path: build/app/outputs/flutter-apk/*.apk
        retention-days: 30

  build-ios:
    runs-on: macos-latest
    name: Build iOS IPA

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.6'
        channel: 'stable'

    - name: Verify Flutter environment
      run: |
        flutter --version
        flutter doctor -v

    - name: Get dependencies
      run: flutter pub get

    - name: Build iOS
      run: |
        flutter build ios --release --no-codesign
        ls -la build/ios/iphoneos

    - name: Create IPA
      run: |
        cd build/ios/iphoneos
        mkdir Payload
        cp -r Runner.app Payload/
        zip -r smekda_exam.ipa Payload
        ls -la *.ipa

    - name: Upload IPA artifacts
      uses: actions/upload-artifact@v4
      with:
        name: smekda-exam-ipa
        path: build/ios/iphoneos/*.ipa
        retention-days: 30